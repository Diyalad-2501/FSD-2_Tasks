<html> 
    <body> 
        <p id="p1" style="font-size: 50px;"> Hello</p> 
        <button onclick="inc()">Increase</button> 
        <button onclick="dec()">Decrease</button> 
        <button onclick="stop()">stop</button> 
    <script> 
        font=50; 
        function fun(font){
        document.getElementById('p1').style.fontSize=font+'px'; 
        } 
        function inc() 
        { 
        test = setInterval(()=>{ 
            if(font<100){ 
                fun(++font); 
            } },100); 
        } 
        function dec() 
        { 
        test =setInterval(()=>{ 
            if(font>15){ 
                fun(--font);} 
            },100); 
        } 
        function stop() { 
            clearInterval(test); 
        } 
    </script> 
</body> 
</html>
